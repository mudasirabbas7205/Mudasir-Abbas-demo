<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="Style.css">
    <link rel="stylesheet" href="Script.js">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5" id="form-box">
  <h2 class="text-center">Student Registration</h2>

  <form class="row" onsubmit="return validateForm()">
    <input class="form-control mb-3" type="text" id="name" placeholder="Enter Name">
    <input class="form-control mb-3" type="email" id="email" placeholder="Enter Email">
    <input class="form-control mb-3" type="number" id="age" placeholder="Enter Age">

    <select class="form-select mb-3" id="course">
      <option value="">Select Course</option>
      <option value="Web Development">Web Development</option>
      <option value="Data Science">Data Science</option>
      <option value="Deep Learning">Deep Learning</option>
      <option value="Graphic Design">Graphic Design</option>
      <option value="AI">Artificial Intelligence</option>
    </select>

    <input class="form-control mb-3" type="password" id="password" placeholder="Enter Password">
    <input class="form-control mb-3" type="password" id="confirmPassword" placeholder="Confirm Password">

    <button type="btn submit bg-primary border-none">Register</button>
  </form>
</div>
</body>
</html>
